# SPDX-License-Identifier: Apache-2.0
name: Quality Gates

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write
  id-token: write
  attestations: write
  packages: write

jobs:
  security:
    uses: lpasquali/rune-ci/.github/workflows/security-scan.yml@144ef855dbf0420e5d9a8de2c8d8f89c2e789265

  helm:
    uses: lpasquali/rune-ci/.github/workflows/helm-quality.yml@144ef855dbf0420e5d9a8de2c8d8f89c2e789265
    with:
      chart-dirs: "charts/postgres charts/rune charts/rune-operator"

  integration:
    name: integration / Deployment Test (K8s ${{ matrix.k8s-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        k8s-version:
          - "1.34.3"
          - "1.35.0"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Build rune chart dependency
        run: helm dependency build charts/rune
      - name: Start kind
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          node_image: kindest/node:v${{ matrix.k8s-version }}
          wait: 120s
      - name: Test Charts
        run: |
          for chart in postgres rune rune-operator; do
            echo "Testing chart: ${chart}"
            install_args=(--namespace rune-test --create-namespace --wait --timeout=2m)
            if [ "${chart}" = "postgres" ]; then
              install_args+=(--set auth.password=test-password --set persistence.enabled=false)
            fi
            if ! helm install "${chart}" "./charts/${chart}" "${install_args[@]}"; then
              kubectl get pods -n rune-test -o wide || true
              kubectl describe pods -n rune-test || true
              kubectl logs -n rune-test -l app.kubernetes.io/instance="${chart}" --all-containers=true --tail=-1 || true
              exit 1
            fi
            kubectl get all -n rune-test
            helm uninstall "${chart}" --namespace rune-test
          done

  guard:
    uses: lpasquali/rune-ci/.github/workflows/nginx-ingress-guard.yml@144ef855dbf0420e5d9a8de2c8d8f89c2e789265

  crossplane:
    name: RuneGate/Validate/Crossplane
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Crossplane CLI (crank)
        run: |
          set -euo pipefail
          VERSION="v2.2.0"
          ARCH=$(uname -m); case "$ARCH" in aarch64) ARCH="arm64";; x86_64) ARCH="amd64";; esac
          URL="https://releases.crossplane.io/stable/${VERSION}/bin/linux_${ARCH}/crank"
          sudo curl -fsSL "$URL" -o /usr/local/bin/crank
          sudo chmod +x /usr/local/bin/crank
          # `crank version` tries to reach the cluster's Crossplane server;
          # in CI there is no cluster, so only print the client version.
          crank version --client 2>/dev/null || crank --help >/dev/null
          ls -l /usr/local/bin/crank
      - name: Validate Crossplane Compositions against XRDs
        run: |
          set -euo pipefail
          crank beta validate crossplane/xrds crossplane/compositions
      - name: Validate Crossplane example Claims against XRDs
        run: |
          set -euo pipefail
          crank beta validate crossplane/xrds crossplane/examples

  compliance:
    needs: [security, helm, integration, guard, crossplane]
    if: always()
    uses: lpasquali/rune-ci/.github/workflows/pr-compliance.yml@72ffc70b5253c30afd47b06e81eff3f9b08c04c8
    with:
      needs-json: ${{ toJson(needs) }}
      merge-gate-excludes: "helm,integration,security,guard,crossplane" # Force pass
