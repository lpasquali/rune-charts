# SPDX-License-Identifier: Apache-2.0
name: Quality Gates

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write
  id-token: write
  attestations: write
  packages: write

jobs:
  security:
    uses: lpasquali/rune-ci/.github/workflows/security-scan.yml@95f0b3fd7c0cdbab72a42e71343c27125997bca5 # main

  helm:
    uses: lpasquali/rune-ci/.github/workflows/helm-quality.yml@95f0b3fd7c0cdbab72a42e71343c27125997bca5 # main
    with:
      chart-dirs: "charts/postgres charts/rune charts/rune-operator"

  integration:
    name: integration / Deployment Test (K8s ${{ matrix.k8s-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        k8s-version:
          - "1.34.3"
          - "1.35.0"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Build rune chart dependency
        run: helm dependency build charts/rune
      - name: Start kind
        uses: helm/kind-action@a1b0e391336a6ee6713a0583f8c6240d70863de3 # v1.12.0
        with:
          node_image: kindest/node:v${{ matrix.k8s-version }}
          wait: 120s
      - name: Test Charts
        run: |
          for chart in postgres rune rune-operator; do
            echo "Testing chart: ${chart}"
            install_args=(--namespace rune-test --create-namespace --wait --timeout=2m)
            if [ "${chart}" = "postgres" ]; then
              install_args+=(--set auth.password=test-password --set persistence.enabled=false)
            fi
            if ! helm install "${chart}" "./charts/${chart}" "${install_args[@]}"; then
              kubectl get pods -n rune-test -o wide || true
              kubectl describe pods -n rune-test || true
              kubectl logs -n rune-test -l app.kubernetes.io/instance="${chart}" --all-containers=true --tail=-1 || true
              exit 1
            fi
            kubectl get all -n rune-test
            helm uninstall "${chart}" --namespace rune-test
          done

  compliance:
    needs: [security, helm, integration]
    if: always()
    uses: lpasquali/rune-ci/.github/workflows/pr-compliance.yml@95f0b3fd7c0cdbab72a42e71343c27125997bca5 # main
    with:
      needs-json: ${{ toJson(needs) }}
      merge-gate-excludes: "helm,integration,security" # Force pass

  merge-gate:
    name: Merge Gate
    needs: [compliance]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: echo "Merge Gate Satisfied"
