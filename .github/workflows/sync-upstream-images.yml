name: Sync Upstream Image Tags

on:
  repository_dispatch:
    types: [image-published]
  workflow_dispatch:
    inputs:
      image_name:
        description: Full image name (e.g. ghcr.io/lpasquali/rune)
        required: true
      image_tag:
        description: Image tag to sync
        required: true
      source_repo:
        description: Source repository name
        required: false
        default: manual

permissions:
  contents: write
  pull-requests: read

jobs:
  sync-tags:
    name: Sync image tag to active branches
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ${{ github.event.client_payload.image_name || inputs.image_name }}
      IMAGE_TAG: ${{ github.event.client_payload.image_tag || inputs.image_tag }}
      SOURCE_REPO: ${{ github.event.client_payload.source_repo || inputs.source_repo || github.repository }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate payload
        run: |
          set -euo pipefail
          test -n "${IMAGE_NAME}"
          test -n "${IMAGE_TAG}"
          echo "Sync request: ${IMAGE_NAME}:${IMAGE_TAG} from ${SOURCE_REPO}"

      - name: Sync to PR branches and non-protected branches
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          API="https://api.github.com/repos/${GITHUB_REPOSITORY}"

          PR_BRANCHES=$(curl -fsSL -H "Authorization: Bearer ${GITHUB_TOKEN}" -H "Accept: application/vnd.github+json" \
            "${API}/pulls?state=open&per_page=100" | jq -r '.[].head.ref')

          ALL_BRANCHES=$(curl -fsSL -H "Authorization: Bearer ${GITHUB_TOKEN}" -H "Accept: application/vnd.github+json" \
            "${API}/branches?per_page=100" | jq -r '.[].name' | grep -v '^main$' || true)

          TARGET_BRANCHES=$(printf '%s\n%s\n' "${PR_BRANCHES}" "${ALL_BRANCHES}" | sed '/^$/d' | sort -u)

          if [ -z "${TARGET_BRANCHES}" ]; then
            echo "No eligible target branches found."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          while IFS= read -r branch; do
            [ -n "${branch}" ] || continue
            echo "Processing branch: ${branch}"

            git fetch origin "${branch}" --depth=1
            git checkout -B "${branch}" "origin/${branch}"

            IMAGE_NAME="${IMAGE_NAME}" IMAGE_TAG="${IMAGE_TAG}" SOURCE_REPO="${SOURCE_REPO}" python3 - <<'PY'
            from pathlib import Path
            import os
            import re
            from datetime import datetime, timezone

            image_name = os.environ["IMAGE_NAME"].strip()
            image_tag = os.environ["IMAGE_TAG"].strip()
            source_repo = os.environ["SOURCE_REPO"].strip()

            env_path = Path('.ci/upstream-images.env')
            env_path.parent.mkdir(parents=True, exist_ok=True)

            kv = {}
            if env_path.exists():
              for line in env_path.read_text(encoding='utf-8').splitlines():
                line = line.strip()
                if not line or line.startswith('#') or '=' not in line:
                  continue
                k, v = line.split('=', 1)
                kv[k.strip()] = v.strip()

            full_ref = f"{image_name}:{image_tag}"
            if image_name.endswith('/rune'):
              kv['RUNE_IMAGE'] = full_ref
            else:
              kv['UPSTREAM_IMAGE'] = full_ref

            kv['LAST_SYNC_SOURCE_REPO'] = source_repo
            kv['LAST_SYNC_AT_UTC'] = datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')

            ordered_keys = [
              'RUNE_IMAGE',
              'UPSTREAM_IMAGE',
              'LAST_SYNC_SOURCE_REPO',
              'LAST_SYNC_AT_UTC',
            ]
            lines = [
              '# Auto-generated by sync-upstream-images workflow. Do not edit manually.'
            ]
            for key in ordered_keys:
              if key in kv:
                lines.append(f"{key}={kv[key]}")
            for key in sorted(k for k in kv.keys() if k not in ordered_keys):
              lines.append(f"{key}={kv[key]}")
            env_path.write_text("\n".join(lines) + "\n", encoding='utf-8')

            # If this is the RUNE API image, update chart default image.tag.
            if image_name.endswith('/rune'):
              values_path = Path('charts/rune/values.yaml')
              if values_path.exists():
                content = values_path.read_text(encoding='utf-8')
                updated = re.sub(r'^  tag:\s*".*"\s*$', f'  tag: "{image_tag}"', content, count=1, flags=re.MULTILINE)
                values_path.write_text(updated, encoding='utf-8')
            PY

            if git diff --quiet; then
              echo "No updates required for ${branch}"
              continue
            fi

            git add .ci/upstream-images.env charts/rune/values.yaml || true
            git commit -m "chore(ci): sync ${IMAGE_NAME}:${IMAGE_TAG} from ${SOURCE_REPO}"
            git push origin "HEAD:${branch}"
          done <<< "${TARGET_BRANCHES}"
