# SPDX-License-Identifier: Apache-2.0
name: Sync Upstream Image Tags

on:
  repository_dispatch:
    types: [image-published]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-tags:
    name: Sync image tag to active branches
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ${{ github.event.client_payload.image_name || inputs.image_name }}
      IMAGE_TAG: ${{ github.event.client_payload.image_tag || inputs.image_tag }}
      SOURCE_REPO: ${{ github.event.client_payload.source_repo || inputs.source_repo || github.repository }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Validate payload
        run: |
          set -euo pipefail
          test -n "${IMAGE_NAME}"
          test -n "${IMAGE_TAG}"
          echo "Sync request: ${IMAGE_NAME}:${IMAGE_TAG} from ${SOURCE_REPO}"

      - name: Sync to PR branches and non-protected branches
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          API="https://api.github.com/repos/${GITHUB_REPOSITORY}"

          # Only include PR branches from this same repo (not forks) to avoid
          # pushing to refs that don't exist in origin.
          PR_BRANCHES=$(curl -fsSL -H "Authorization: Bearer ${GITHUB_TOKEN}" -H "Accept: application/vnd.github+json" \
            "${API}/pulls?state=open&per_page=100" | \
            jq -r --arg repo "${GITHUB_REPOSITORY}" \
              '.[] | select(.head.repo.full_name == $repo) | .head.ref')

          ALL_BRANCHES=$(curl -fsSL -H "Authorization: Bearer ${GITHUB_TOKEN}" -H "Accept: application/vnd.github+json" \
            "${API}/branches?per_page=100" | jq -r '.[].name' || true)

          TARGET_BRANCHES=$(printf '%s\n%s\n' "${PR_BRANCHES}" "${ALL_BRANCHES}" | sed '/^$/d' | sort -u)

          if [ -z "${TARGET_BRANCHES}" ]; then
            echo "No eligible target branches found."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          while IFS= read -r branch; do
            [ -n "${branch}" ] || continue
            echo "Processing branch: ${branch}"

            if ! git fetch origin "${branch}" --depth=1 2>/dev/null; then
              echo "  ✗ Could not fetch ${branch} — skipping"
              continue
            fi
            git checkout -B "${branch}" "origin/${branch}"

            python3 .ci/sync_image_tag.py

            if git diff --quiet; then
              echo "No updates required for ${branch}"
              continue
            fi

            git add .ci/upstream-images.env charts/rune/values.yaml charts/rune-operator/values.yaml || true
            git commit -m "chore(ci): sync ${IMAGE_NAME}:${IMAGE_TAG} from ${SOURCE_REPO}"
            if [ "${branch}" = "main" ]; then
              SYNC_BRANCH="ci/sync-main-$(git rev-parse --short HEAD)"
              git checkout -b "${SYNC_BRANCH}"
              git push origin "${SYNC_BRANCH}"
              gh pr create \
                --title "chore(ci): sync ${IMAGE_NAME}:${IMAGE_TAG} from ${SOURCE_REPO} to main" \
                --body "Automated image tag sync. Auto-merges when CI passes." \
                --base main \
                --head "${SYNC_BRANCH}" \
                --label "automated" 2>/dev/null || true
              gh pr merge "${SYNC_BRANCH}" --auto --squash 2>/dev/null || true
              git checkout "${branch}"
            else
              git push origin "HEAD:${branch}"
            fi
          done <<< "${TARGET_BRANCHES}"
