---
# RBAC for provider-kubernetes to read CNPG-created Secrets
# in the CNPG cluster namespace (typically cnpg-system)
#
# CNPG creates Secrets named <cluster-name>-app with connection details.
# Crossplane needs to read these to bridge them into rune-db-secret.

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: crossplane-cnpg-reader
  namespace: cnpg-system
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["postgresql.cnpg.io"]
    resources: ["clusters"]
    verbs: ["get", "list", "watch"]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: crossplane-cnpg-reader
  namespace: cnpg-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: crossplane-cnpg-reader
subjects:
  - kind: ServiceAccount
    name: provider-kubernetes
    namespace: crossplane-system

---
# Note: The secret-writer-role.yaml in this directory already grants
# "create/update secrets" in the rune namespace, which is where
# Crossplane writes rune-db-secret.
#
# Summary of required permissions:
# - cnpg-system: read Secrets, read Clusters (this file)
# - rune: create/update Secrets (secret-writer-role.yaml)
# - minio-tenant: read Secrets (for MinIO; add similar Role if needed)
