---
# RBAC for provider-kubernetes to write Secrets into the rune namespace
# This role allows the provider-kubernetes controller SA to create and
# update Secrets in the rune namespace

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: crossplane-secret-writer
  namespace: rune
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]

---

# RoleBinding for provider-kubernetes ServiceAccount (created by Crossplane
# in crossplane-system namespace)
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: crossplane-secret-writer
  namespace: rune
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: crossplane-secret-writer
subjects:
  - kind: ServiceAccount
    name: provider-kubernetes
    namespace: crossplane-system

---

# NOTE: For CNPG path (Phase 1a), an additional Role will be needed in
# the CNPG cluster namespace (e.g., cnpg-system) to read the
# <cluster-name>-app secret that CNPG creates. This will be added in
# Phase 1a.
