---
# AWS RDS PostgreSQL + IAM user Composition
# Creates RDS instance, database user, access key, and writes rune-db-secret
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: runedatabase-aws
  labels:
    provider: aws
spec:
  compositeTypeRef:
    apiVersion: database.infra.rune.ai/v1alpha1
    kind: XRuneDatabase
  mode: Pipeline
  pipeline:
    - step: provision-rds
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: PatchAndTransformRequest
        metadata:
          name: create-rds
        spec:
          resources:
            - name: rds-instance
              base:
                apiVersion: rds.aws.upbound.io/v1beta1
                kind: Instance
                metadata:
                  annotations:
                    crossplane.io/composition-resource-name: >-
                      rds-instance
                spec:
                  forProvider:
                    region: us-east-1
                    engine: postgres
                    engineVersion: "16.1"
                    allocatedStorage: "20"
                    storageType: gp3
                    dbInstanceClass: db.t3.micro
                    username: rune
                    password: ChangeMeOnce!
                    dbName: rune
                    skipFinalSnapshot: true
                    publiclyAccessible: false
                  managementPolicies:
                    - "Observe"
                    - "Create"
                    - "Update"
              patches:
                - type: FromCompositeFieldPath
                  fromFieldPath: spec.parameters.region
                  toFieldPath: spec.forProvider.region
                - type: FromCompositeFieldPath
                  fromFieldPath: spec.parameters.version
                  toFieldPath: >-
                    spec.forProvider.engineVersion
                - type: FromCompositeFieldPath
                  fromFieldPath: >-
                    spec.parameters.aws.instanceClass
                  toFieldPath: >-
                    spec.forProvider.dbInstanceClass
                  transforms:
                    - type: string
                      string:
                        fmt: "db.%s"
    - step: write-connection-secret
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplatingRequest
        metadata:
          name: create-rds-secret
        spec:
          delimiters:
            left: "[["
            right: "]]"
          source: Inline
          inline:
            template: |
              apiVersion: kubernetes.crossplane.io/v1alpha2
              kind: Object
              metadata:
                annotations:
                  crossplane.io/composition-resource-name: >-
                    rds-secret-object
              spec:
                deletionPolicy: Delete
                providerConfigRef:
                  name: kubernetes-provider
                forProvider:
                  manifest:
                    apiVersion: v1
                    kind: Secret
                    metadata:
                      name: rune-db-secret
                      namespace: rune
                      labels:
                        app.kubernetes.io/managed-by: crossplane
                    type: Opaque
                    stringData:
                      RUNE_DB_URL: >-
                        postgresql://rune:ChangeMeOnce!@[[
                        .observed.resources.rdsInstance.status.
                        atProvider.endpoint ]]:5432/rune
    - step: auto-ready
      functionRef:
        name: function-auto-ready

---
# AWS S3 Bucket + IAM user Composition
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: runeobjectstore-aws
  labels:
    provider: aws
spec:
  compositeTypeRef:
    apiVersion: storage.infra.rune.ai/v1alpha1
    kind: XRuneObjectStore
  mode: Pipeline
  pipeline:
    - step: create-s3-resources
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: PatchAndTransformRequest
        metadata:
          name: create-s3
        spec:
          resources:
            - name: s3-bucket
              base:
                apiVersion: s3.aws.upbound.io/v1beta1
                kind: Bucket
                metadata:
                  annotations:
                    crossplane.io/composition-resource-name: >-
                      s3-bucket
                spec:
                  forProvider:
                    region: us-east-1
                  managementPolicies:
                    - "Observe"
                    - "Create"
              patches:
                - type: FromCompositeFieldPath
                  fromFieldPath: spec.parameters.bucketName
                  toFieldPath: metadata.name
                - type: FromCompositeFieldPath
                  fromFieldPath: spec.parameters.region
                  toFieldPath: spec.forProvider.region
            - name: s3-access-key
              base:
                apiVersion: iam.aws.upbound.io/v1beta1
                kind: AccessKey
                metadata:
                  annotations:
                    crossplane.io/composition-resource-name: >-
                      s3-access-key
                spec:
                  forProvider:
                    userRef:
                      name: rune-s3-user
                  managementPolicies:
                    - "Observe"
                    - "Create"
    - step: write-s3-secret
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplatingRequest
        metadata:
          name: create-s3-secret
        spec:
          delimiters:
            left: "[["
            right: "]]"
          source: Inline
          inline:
            template: |
              apiVersion: kubernetes.crossplane.io/v1alpha2
              kind: Object
              metadata:
                annotations:
                  crossplane.io/composition-resource-name: >-
                    s3-secret-object
              spec:
                deletionPolicy: Delete
                providerConfigRef:
                  name: kubernetes-provider
                forProvider:
                  manifest:
                    apiVersion: v1
                    kind: Secret
                    metadata:
                      name: rune-s3-secret
                      namespace: rune
                      labels:
                        app.kubernetes.io/managed-by: crossplane
                    type: Opaque
                    stringData:
                      S3_ACCESS_KEY_ID: >-
                        [[ .observed.resources.s3AccessKey.
                        status.atProvider.id ]]
                      S3_SECRET_ACCESS_KEY: >-
                        [[ .observed.resources.s3AccessKey.
                        status.atProvider.secret ]]
                      S3_ENDPOINT: https://s3.amazonaws.com
                      S3_BUCKET: >-
                        [[ .composite.spec.parameters.bucketName ]]
    - step: auto-ready
      functionRef:
        name: function-auto-ready
