---
# Crossplane Provider packages required by compositions
# Install these before applying compositions

# provider-kubernetes is required by all compositions for writing Secrets
apiVersion: pkg.crossplane.io/v1beta1
kind: Provider
metadata:
  name: provider-kubernetes
spec:
  package: xpkg.upbound.io/crossplane-contrib/provider-kubernetes:v1.2.1

