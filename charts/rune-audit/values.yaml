# Clean values.yaml for rune-audit
image:
  repository: ghcr.io/lpasquali/rune-audit
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

schedule: "0 6 * * 1" # Weekly Monday 6am UTC
failedJobsHistoryLimit: 1
successfulJobsHistoryLimit: 3
concurrencyPolicy: Forbid

config:
  owner: lpasquali
  repos: "rune,rune-operator,rune-ui,rune-charts,rune-docs,rune-audit,rune-airgapped"

args: ["collect", "all"]

githubToken:
  create: false
  secretName: ""
  token: ""

env: []

serviceAccount:
  create: true
  name: ""
  annotations: {}
  automount: false

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 999
  runAsGroup: 999
  fsGroup: 999
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  privileged: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
    - ALL

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

nodeSelector: {}
tolerations: []
affinity: {}
