# Default values for the RUNE Helm chart.
# Override these in your own values file or via --set.

replicaCount: 1

image:
  repository: ghcr.io/lpasquali/rune
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "main-165ce44"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# ---------------------------------------------------------------------------
# Service Account
# ---------------------------------------------------------------------------
serviceAccount:
  # Specifies whether a service account should be created.
  create: true
  # Annotations to add to the service account.
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template.
  name: ""
  # Enable automatic mounting of the service account token so the pod can use
  # the ClusterRole granted by this chart to query the Kubernetes API.
  # Set to false only if your workload does not need in-cluster API access.
  automountServiceAccountToken: true

# ---------------------------------------------------------------------------
# RBAC — ClusterRole to allow the RUNE pod to query the K8s cluster
# (required for HolmesGPT agentic commands)
# ---------------------------------------------------------------------------
rbac:
  create: true
  # Set to true if HolmesGPT only needs read access to most resources.
  readOnly: true
  # Avoid cluster-wide secret access by default (Trivy AVD-KSV-0041).
  # Set true only if your use-case explicitly requires listing/getting secrets cluster-wide.
  allowSecretsAccess: false

# ---------------------------------------------------------------------------
# Pod configuration
# ---------------------------------------------------------------------------
podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: false  # set true once the image runs as non-root

securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

# ---------------------------------------------------------------------------
# Service
# ---------------------------------------------------------------------------
service:
  type: ClusterIP
  port: 8080
  # Annotations for the Service (e.g. cloud LB annotations)
  annotations: {}

# ---------------------------------------------------------------------------
# Ingress
# ---------------------------------------------------------------------------
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: rune.example.com
      paths:
        - path: /
          pathType: Prefix
  # TLS configuration — leave empty for HTTP-only, add entries for HTTPS.
  tls: []
  #  - secretName: rune-tls
  #    hosts:
  #      - rune.example.com

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
resources: {}
  # limits:
  #   cpu: 500m
  #   memory: 512Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# ---------------------------------------------------------------------------
# Autoscaling
# ---------------------------------------------------------------------------
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

# ---------------------------------------------------------------------------
# Probes
# ---------------------------------------------------------------------------
livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 30
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3

# ---------------------------------------------------------------------------
# RUNE application configuration
# All keys map to RUNE_* environment variables inside the container.
# ---------------------------------------------------------------------------
rune:
  # --- Backend / API server ---
  backend: "local"             # RUNE_BACKEND: local | http
  api:
    host: "0.0.0.0"            # RUNE_API_HOST
    port: "8080"               # RUNE_API_PORT
    baseUrl: ""                # RUNE_API_BASE_URL (for http backend mode)
    tenant: "default"          # RUNE_API_TENANT
    authDisabled: "1"          # RUNE_API_AUTH_DISABLED: "1" to skip auth in dev
    # Tokens as comma-separated "tenant:token" pairs.
    # Provide via existingSecret instead of inline for production.
    tokens: ""                 # RUNE_API_TOKENS

  # --- Debug ---
  debug: "false"               # RUNE_DEBUG

  # --- Vast.ai ---
  vastai:
    enabled: "false"                                  # RUNE_VASTAI
    template: "c166c11f035d3a97871a23bd32ca6aba"      # RUNE_VASTAI_TEMPLATE
    minDph: "2.3"                                     # RUNE_VASTAI_MIN_DPH
    maxDph: "3.0"                                     # RUNE_VASTAI_MAX_DPH
    reliability: "0.99"                               # RUNE_VASTAI_RELIABILITY
    stopInstance: "false"                             # RUNE_VASTAI_STOP_INSTANCE
    # Vast.ai API key — use existingSecret in production instead of inline.
    apiKey: ""                                        # VAST_API_KEY

  # --- Ollama ---
  ollama:
    url: "http://ollama:11434"   # RUNE_OLLAMA_URL
    warmup: "true"               # RUNE_OLLAMA_WARMUP
    warmupTimeout: "300"         # RUNE_OLLAMA_WARMUP_TIMEOUT

  # --- Agent / Benchmark ---
  question: "What is unhealthy in this Kubernetes cluster?"  # RUNE_QUESTION
  model: "llama3.1:8b"                                       # RUNE_MODEL
  idempotencyKey: ""                                         # RUNE_IDEMPOTENCY_KEY

  # --- Kubeconfig ---
  # If the pod uses its own ServiceAccount (recommended), leave kubeconfig empty.
  # Supply a kubeconfig via an existing Secret only when connecting to an
  # external cluster different from the one the pod runs in.
  kubeconfig: ""               # RUNE_KUBECONFIG (path inside the pod)
  # Name of a pre-existing Secret containing a "kubeconfig" key.
  # The secret will be mounted at /root/.kube/config.
  kubeconfigSecret: ""

  # --- Sensitive values from an existing Secret ---
  # The secret must contain keys matching the env var names (without RUNE_ prefix
  # is fine — use envFrom with a secretRef and a prefix, or plain key names).
  # Leave empty to use inline values above.
  existingSecret: ""

  # --- Extra arbitrary environment variables ---
  extraEnv: []
  # - name: CUSTOM_VAR
  #   value: "custom-value"

  # --- Extra envFrom (ConfigMaps / Secrets) ---
  extraEnvFrom: []
  # - secretRef:
  #     name: my-rune-secret

# ---------------------------------------------------------------------------
# Cloud Provider Credentials
# ---------------------------------------------------------------------------
# SECURITY NOTE: Never commit real secrets to version control.
#
# Three auth methods are supported for every provider — use the most secure
# one available in your environment:
#
#   Method 1 — Workload Identity / IRSA / Pod Identity  (RECOMMENDED, zero secrets)
#              Annotate serviceAccount.annotations. No credentials in the pod.
#
#   Method 2 — Reference an existing Kubernetes Secret  (SECURE)
#              Set existingSecret; create it out-of-band with `kubectl create secret`.
#              The Deployment mounts individual keys via secretKeyRef.
#
#   Method 3 — Inline values                            (DEV ONLY)
#              Set values below. A Kubernetes Secret named <release>-cloud-secrets
#              is created from them. Encrypt this file with helm-secrets + SOPS/age
#              before committing: `helm secrets encrypt secrets.values.yaml`.
#              See charts/rune/secret.values.example.yaml for a template.
# ---------------------------------------------------------------------------
cloud:

  # ── AWS ──────────────────────────────────────────────────────────────────
  aws:
    # --- Method 1: IRSA (EKS) or EKS Pod Identity — annotate the SA ---
    # serviceAccount:
    #   annotations:
    #     eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/rune-role

    # --- Method 2: Existing Kubernetes Secret ---
    # kubectl create secret generic rune-aws \
    #   --from-literal=AWS_ACCESS_KEY_ID=AKIA... \
    #   --from-literal=AWS_SECRET_ACCESS_KEY=wJalrX... \
    #   --from-literal=AWS_DEFAULT_REGION=us-east-1
    existingSecret: ""   # name of the Secret; leave empty for Method 1 or 3

    # --- Method 3: Inline (dev only — encrypt with helm-secrets + SOPS) ---
    region: ""                # AWS_DEFAULT_REGION
    accessKeyId: ""           # AWS_ACCESS_KEY_ID       [INSECURE: use existingSecret]
    secretAccessKey: ""       # AWS_SECRET_ACCESS_KEY   [INSECURE: use existingSecret]
    sessionToken: ""          # AWS_SESSION_TOKEN        optional, for STS temp creds

  # ── Azure ─────────────────────────────────────────────────────────────────
  azure:
    # --- Method 1: Azure Workload Identity (AKS) ---
    # serviceAccount:
    #   annotations:
    #     azure.workload.identity/client-id: <MANAGED_IDENTITY_CLIENT_ID>
    # podLabels:
    #   azure.workload.identity/use: "true"

    # --- Method 2: Existing Kubernetes Secret ---
    # kubectl create secret generic rune-azure \
    #   --from-literal=AZURE_CLIENT_ID=xxx \
    #   --from-literal=AZURE_CLIENT_SECRET=xxx \
    #   --from-literal=AZURE_TENANT_ID=xxx \
    #   --from-literal=AZURE_SUBSCRIPTION_ID=xxx
    existingSecret: ""   # name of the Secret

    # --- Method 3: Inline (dev only) ---
    tenantId: ""              # AZURE_TENANT_ID
    subscriptionId: ""        # AZURE_SUBSCRIPTION_ID
    clientId: ""              # AZURE_CLIENT_ID
    clientSecret: ""          # AZURE_CLIENT_SECRET     [INSECURE: use existingSecret]

  # ── GCP / Google Cloud ────────────────────────────────────────────────────
  gcp:
    # --- Method 1: Workload Identity (GKE) ---
    # serviceAccount:
    #   annotations:
    #     iam.gke.io/gcp-service-account: rune@PROJECT.iam.gserviceaccount.com

    # --- Method 2: Service-account key JSON as a Kubernetes Secret ---
    # kubectl create secret generic rune-gcp \
    #   --from-file=credentials.json=/path/to/sa-key.json
    existingSecret: ""        # Secret must contain key: credentials.json
    credentialsMountPath: "/var/secrets/gcp"  # mounted inside the container

    # --- Method 3: Inline project reference (combine with existingSecret for key) ---
    project: ""               # GOOGLE_CLOUD_PROJECT / GCLOUD_PROJECT

  # ── Remote / External Kubernetes Cluster ─────────────────────────────────
  # Use this to grant Holmes access to a cluster other than the one it runs in.
  # The in-cluster ServiceAccount is always available; this is additive.
  remoteKubernetes:
    enabled: false
    # kubectl create secret generic rune-remote-kubeconfig \
    #   --from-file=kubeconfig=/path/to/remote-kubeconfig.yaml
    existingSecret: ""        # Secret must contain key: kubeconfig
    mountPath: "/var/secrets/kubeconfig"

  # ── External Secrets Operator (ESO) ──────────────────────────────────────
  # When enabled, ESO ExternalSecret resources are created to pull credentials
  # automatically from a cloud secret store and keep them rotated.
  # Requires: https://external-secrets.io installed in the cluster.
  externalSecrets:
    enabled: false
    # Name and kind of the (Cluster)SecretStore to use.
    secretStoreName: "cluster-secret-store"
    secretStoreKind: "ClusterSecretStore"   # or "SecretStore"
    refreshInterval: "1h"
    # Remote key paths in your secret store.
    # Each path must contain all the key/value pairs for that provider.
    aws:
      secretPath: "rune/aws-credentials"      # keys: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_DEFAULT_REGION
    azure:
      secretPath: "rune/azure-credentials"    # keys: AZURE_CLIENT_ID, AZURE_CLIENT_SECRET, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
    gcp:
      secretPath: "rune/gcp-credentials"      # key: credentials.json (raw JSON content)

# ---------------------------------------------------------------------------
# Issue #18 — S3 / PVC storage persistence
# ---------------------------------------------------------------------------

# persistence: mounts a PersistentVolumeClaim at /app/.rune-api so the SQLite
# job store survives pod restarts.  When disabled an emptyDir is used (data
# is lost on restart).
persistence:
  enabled: false
  storageClass: ""           # "" → cluster default StorageClass
  size: 10Gi
  accessMode: ReadWriteOnce
  # Set to an existing PVC name to skip creating a new one.
  existingClaim: ""

# s3: enables S3-compatible object storage for benchmark artefacts.
# Credentials are injected as environment variables.  Use existingSecret
# or cloud.aws.existingSecret for production; avoid inline keys.
s3:
  enabled: false
  bucket: ""
  region: ""
  endpoint: ""               # leave empty for AWS S3; set for MinIO / Ceph RGW
  existingSecret: ""         # Secret must contain: S3_ACCESS_KEY_ID, S3_SECRET_ACCESS_KEY

# ---------------------------------------------------------------------------
# Issue #19 — HIL power telemetry reconciliation sidecar
# ---------------------------------------------------------------------------

# telemetry: injects a sidecar that polls Redfish/PDU endpoints and writes
# power telemetry to a shared emptyDir volume at /telemetry.
telemetry:
  enabled: false
  image: ghcr.io/lpasquali/rune-telemetry:main-165ce44
  # Redfish REST endpoint of the BMC (e.g. https://bmc.lab.example.com)
  redfishEndpoint: ""
  # PDU SNMP/REST endpoint (e.g. http://pdu.lab.example.com)
  pduEndpoint: ""
  # How often (seconds) the sidecar polls both endpoints.
  pollIntervalSeconds: 30
