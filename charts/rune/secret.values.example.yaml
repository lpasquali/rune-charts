# secret.values.example.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Template for encrypted Helm values containing cloud credentials.
#
# NEVER commit this file with real values. Use one of:
#
#   A) SOPS + age (recommended, cloud-agnostic)
#      1. Install: brew install sops age
#      2. Generate age key: age-keygen -o ~/.config/sops/age/keys.txt
#      3. Create .sops.yaml at repo root:
#           creation_rules:
#             - path_regex: \.enc\.yaml$
#               age: >-
#                 age1<YOUR_PUBLIC_KEY>
#      4. Encrypt:  sops --encrypt secret.values.yaml > secret.values.enc.yaml
#      5. Deploy:   helm secrets install rune ./charts/rune \
#                     -f values.yaml -f secret.values.enc.yaml
#
#   B) helm-secrets plugin (wraps SOPS/age/GPG)
#      helm plugin install https://github.com/jkroepke/helm-secrets
#      helm secrets encrypt secret.values.yaml
#      helm secrets install rune ./charts/rune -f secrets://secret.values.yaml
#
#   C) Sealed Secrets (GitOps-friendly)
#      kubeseal --format yaml < k8s-secret.yaml > sealed-secret.yaml
#      # Commit sealed-secret.yaml; it can only be decrypted by the cluster.
#
# ─────────────────────────────────────────────────────────────────────────────

# Vast.ai API key
rune:
  vastai:
    apiKey: "REPLACE_ME"

# AWS IAM credentials (Method 3 — dev only; prefer IRSA/existingSecret)
cloud:
  aws:
    region: "us-east-1"
    accessKeyId: "AKIAIOSFODNN7EXAMPLE"
    secretAccessKey: "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
    # sessionToken: ""   # uncomment for STS temporary credentials

  # Azure Service Principal (Method 3 — dev only; prefer Workload Identity/existingSecret)
  azure:
    tenantId: "00000000-0000-0000-0000-000000000000"
    subscriptionId: "00000000-0000-0000-0000-000000000001"
    clientId: "00000000-0000-0000-0000-000000000002"
    clientSecret: "REPLACE_ME"

  # GCP — set project here; supply the service-account JSON via existingSecret
  # (Method 1 Workload Identity is preferred on GKE; no secret needed)
  gcp:
    project: "my-gcp-project"
    # For the key file, create the Secret out-of-band:
    # kubectl create secret generic rune-gcp \
    #   --from-file=credentials.json=./sa-key.json
    existingSecret: "rune-gcp"
