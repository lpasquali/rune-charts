{{/*
secret.yaml — creates a Kubernetes Secret from inline dev credentials.

This Secret is only rendered when at least one inline cloud credential is
provided in values.yaml. It acts as an indirection layer so plaintext secrets
never appear directly in the Deployment spec.

PRODUCTION USE: Do NOT use inline values. Instead:
  • Set cloud.<provider>.existingSecret to a pre-created Secret name, OR
  • Use Workload Identity / IRSA annotations on the ServiceAccount, OR
  • Enable cloud.externalSecrets for automated rotation via ESO.

DEV USE: Encrypt this values file with helm-secrets + SOPS before committing:
  helm plugin install https://github.com/jkroepke/helm-secrets
  sops --encrypt --age <RECIPIENT> secrets.values.yaml > secrets.values.enc.yaml
  helm secrets install rune ./charts/rune -f secrets.values.enc.yaml
*/}}
{{- $hasAws   := or .Values.cloud.aws.accessKeyId .Values.cloud.aws.secretAccessKey }}
{{- $hasAzure := .Values.cloud.azure.clientSecret }}
{{- $hasVastai := .Values.rune.vastai.apiKey }}
{{- if or $hasAws $hasAzure $hasVastai }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "rune.fullname" . }}-cloud-secrets
  labels:
    {{- include "rune.labels" . | nindent 4 }}
  annotations:
    # Reminder: rotate these credentials and delete this Secret in production.
    helm.sh/secret: "true"
type: Opaque
stringData:
  {{- if .Values.cloud.aws.accessKeyId }}
  AWS_ACCESS_KEY_ID: {{ .Values.cloud.aws.accessKeyId | quote }}
  {{- end }}
  {{- if .Values.cloud.aws.secretAccessKey }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.cloud.aws.secretAccessKey | quote }}
  {{- end }}
  {{- if .Values.cloud.aws.sessionToken }}
  AWS_SESSION_TOKEN: {{ .Values.cloud.aws.sessionToken | quote }}
  {{- end }}
  {{- if .Values.cloud.azure.clientSecret }}
  AZURE_CLIENT_SECRET: {{ .Values.cloud.azure.clientSecret | quote }}
  {{- end }}
  {{- if .Values.rune.vastai.apiKey }}
  VAST_API_KEY: {{ .Values.rune.vastai.apiKey | quote }}
  {{- end }}
{{- end }}
