{{/*
externalsecret.yaml — External Secrets Operator (ESO) integration.

When cloud.externalSecrets.enabled=true, three ExternalSecret resources are
created (one per provider with a non-empty secretPath). ESO pulls the credentials
from the configured cloud secret store and creates standard Kubernetes Secrets
that the Deployment references via secretKeyRef.

Prerequisites:
  helm repo add external-secrets https://charts.external-secrets.io
  helm install external-secrets external-secrets/external-secrets -n external-secrets --create-namespace

The SecretStore / ClusterSecretStore is created by you (it contains provider
credentials for ESO itself). See: https://external-secrets.io/latest/provider/

Supported stores out of the box: AWS Secrets Manager, Azure Key Vault,
GCP Secret Manager, HashiCorp Vault, and many more.
*/}}
{{- if .Values.cloud.externalSecrets.enabled }}
{{- $store := .Values.cloud.externalSecrets.secretStoreName }}
{{- $storeKind := .Values.cloud.externalSecrets.secretStoreKind }}
{{- $interval := .Values.cloud.externalSecrets.refreshInterval }}

{{- if .Values.cloud.externalSecrets.aws.secretPath }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "rune.fullname" . }}-aws-eso
  labels:
    {{- include "rune.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ $interval }}
  secretStoreRef:
    name: {{ $store }}
    kind: {{ $storeKind }}
  target:
    name: {{ include "rune.fullname" . }}-aws-eso
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: {{ .Values.cloud.externalSecrets.aws.secretPath }}
{{- end }}

{{- if .Values.cloud.externalSecrets.azure.secretPath }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "rune.fullname" . }}-azure-eso
  labels:
    {{- include "rune.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ $interval }}
  secretStoreRef:
    name: {{ $store }}
    kind: {{ $storeKind }}
  target:
    name: {{ include "rune.fullname" . }}-azure-eso
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: {{ .Values.cloud.externalSecrets.azure.secretPath }}
{{- end }}

{{- if .Values.cloud.externalSecrets.gcp.secretPath }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "rune.fullname" . }}-gcp-eso
  labels:
    {{- include "rune.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ $interval }}
  secretStoreRef:
    name: {{ $store }}
    kind: {{ $storeKind }}
  target:
    name: {{ include "rune.fullname" . }}-gcp-eso
    creationPolicy: Owner
  data:
    - secretKey: credentials.json
      remoteRef:
        key: {{ .Values.cloud.externalSecrets.gcp.secretPath }}
        # The entire secret value is the service-account JSON
{{- end }}

{{- end }}
