{{- if .Values.postgres.enabled }}
{{- if .Values.rune.database.existingSecret }}
{{/* User supplies RUNE_DB_URL via an existing Secret (also used when Postgres creds come from postgres.auth.existingSecret). */}}
{{- else if .Values.postgres.auth.existingSecret }}
{{- fail "postgres.auth.existingSecret is set: set rune.database.existingSecret to a Secret containing RUNE_DB_URL (the parent chart cannot derive the connection string without credentials in values)." }}
{{- else }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "rune.fullname" . }}-db-url
  labels:
    {{- include "rune.labels" . | nindent 4 }}
type: Opaque
stringData:
  RUNE_DB_URL: {{ include "rune.dbUrl" . | quote }}
{{- end }}
{{- end }}
