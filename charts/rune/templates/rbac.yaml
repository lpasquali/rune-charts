{{- if .Values.rbac.create -}}
{{- $verbs := list "get" "list" "watch" -}}
{{- if not .Values.rbac.readOnly -}}
{{- $verbs = list "get" "list" "watch" "create" "update" "patch" "delete" -}}
{{- end -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "rune.fullname" . }}
  labels:
    {{- include "rune.labels" . | nindent 4 }}
rules:
  # ── Core ──────────────────────────────────────────────────────────────────
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - pods/status
      - pods/exec
      - nodes
      - nodes/metrics
      - nodes/stats
      - services
      - endpoints
      - endpointslices
      - events
      - namespaces
      - persistentvolumeclaims
      - persistentvolumes
      - configmaps
      - replicationcontrollers
      - resourcequotas
      - limitranges
      - serviceaccounts
      {{- if .Values.rbac.allowSecretsAccess }}
      - secrets
      {{- end }}
    verbs: {{ $verbs | toJson }}

  # ── Apps ──────────────────────────────────────────────────────────────────
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
      - controllerrevisions
    verbs: {{ $verbs | toJson }}

  # ── Batch ─────────────────────────────────────────────────────────────────
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: {{ $verbs | toJson }}

  # ── Networking ────────────────────────────────────────────────────────────
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
      - ingressclasses
      - networkpolicies
    verbs: {{ $verbs | toJson }}

  # ── Autoscaling ───────────────────────────────────────────────────────────
  - apiGroups: ["autoscaling"]
    resources:
      - horizontalpodautoscalers
    verbs: ["get", "list", "watch"]

  # ── Policy ────────────────────────────────────────────────────────────────
  - apiGroups: ["policy"]
    resources:
      - poddisruptionbudgets
    verbs: ["get", "list", "watch"]

  # ── Storage ───────────────────────────────────────────────────────────────
  - apiGroups: ["storage.k8s.io"]
    resources:
      - storageclasses
      - volumeattachments
      - csidrivers
      - csinodes
    verbs: ["get", "list", "watch"]

  # ── RBAC (read-only introspection) ────────────────────────────────────────
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources:
      - clusterroles
      - clusterrolebindings
      - roles
      - rolebindings
    verbs: ["get", "list", "watch"]

  # ── Certificates ─────────────────────────────────────────────────────────
  - apiGroups: ["certificates.k8s.io"]
    resources:
      - certificatesigningrequests
    verbs: ["get", "list", "watch"]

  # ── Admission webhooks (read-only) ────────────────────────────────────────
  - apiGroups: ["admissionregistration.k8s.io"]
    resources:
      - mutatingwebhookconfigurations
      - validatingwebhookconfigurations
    verbs: ["get", "list", "watch"]

  # ── CRDs / API discovery ──────────────────────────────────────────────────
  - apiGroups: ["apiextensions.k8s.io"]
    resources:
      - customresourcedefinitions
    verbs: ["get", "list", "watch"]

  # ── Metrics ───────────────────────────────────────────────────────────────
  - apiGroups: ["metrics.k8s.io"]
    resources:
      - pods
      - nodes
    verbs: ["get", "list"]

  # ── Non-resource URLs ─────────────────────────────────────────────────────
  - nonResourceURLs:
      - /healthz
      - /livez
      - /readyz
      - /metrics
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "rune.fullname" . }}
  labels:
    {{- include "rune.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "rune.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "rune.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
